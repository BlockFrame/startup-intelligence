      .skeleton-shell{display:flex;flex-direction:column;height:100vh;background:#0b0d0e;font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,Arial,sans-serif;overflow:hidden}

      .skeleton-dot{width:8px;height:8px;border-radius:50%;background:#20d39b}

      .skeleton-map-body{flex:1;position:relative;overflow:hidden}
      .skeleton-map-body::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#101516 0%,#15191b 50%,#0d1112 100%);opacity:1}
      .skeleton-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding:16px;align-content:start}
      .skeleton-panel{height:320px;background:#15191b;border:1px solid #283034;border-radius:8px;display:flex;flex-direction:column;box-shadow:0 18px 42px rgba(0,0,0,.34)}

      [data-theme="light"] .skeleton-shell{background:#f8f9fa}
      [data-theme="light"] .skeleton-header{background:#fff;border-bottom-color:#d4d4d4}

    <!-- Force-clear stale service worker if module scripts 404 (post-deploy cache mismatch) -->
    <script>
    (function(){
      if(!('serviceWorker' in navigator))return;
      var key='si-sw-nuke';
      if(sessionStorage.getItem(key))return;
      window.addEventListener('error',function(e){
        var u=e.target&&(e.target.src||e.target.href)||'';
        if(u&&/\/assets\//.test(u)){
          sessionStorage.setItem(key,'1');
          navigator.serviceWorker.getRegistrations().then(function(regs){
            var p=regs.map(function(r){return r.unregister()});
            Promise.all(p).then(function(){
              if(caches&&caches.keys){
                caches.keys().then(function(ks){
                  return Promise.all(ks.map(function(k){return caches.delete(k)}));
                }).then(function(){location.reload()});
              }else{location.reload()}
            });
          });
        }
      },true);
    })()
    </script>
